<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Form Validation</title>
<body>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1{
            margin: 30px 0 10px;
            font-size: 40;
            font-weight: bold;
        }
        hr{
            width: 85%;
            border: none;
            border-top: 2px solid burlywood;
            margin-bottom: 25px;
        }
        .box{
            width: 420px;
            margin: auto;
            border: 2px solid blue;
            padding: 18px;
        }
        .row{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }
        label{
            width: 90px;
            text-align: right;
            font-size: 18px;
        }
        input{
            height: 24px;
            padding: 4px;
            border: 1px solid green;
        }
        #email , #password {
            width: 170px;
        }
        #age{
            width: 55px;
        }
        button{
            margin-top: 10px;
            padding: 4px 14 px;
            cursor: pointer;
        }
        #message{
            margin-top: 20px;
            font-size: 22px;
            font-weight: 500;
        }
        </style>
        </head>
    </style>
</body>
<h1>REAL-TIME VALIDATION USING JS</h1>
<hr>
<div class="box">
    <form id="loginForm">
        <div class="row">
            <label>Email:</label>
            <input type="text" id="email" placeholder="myname@gmail.com">
            </div>
            <div class="row">
                <label>Password:</label>
                <input type="text" id="password" placeholder="..........">

            </div>
            <div class="row">
                <Label>Age:</Label>
                <input type="number" id="age">
            </div>
            <button type="submit">Login</button>
    </form>
    <p id="message"></p>
    <script src="Script.js"></script>
</div>
</html>
